<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sunrise" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="55%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="111" ry="111"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="url(#sunrise)"/>
  </g>
  <rect x="0.5" y="0.5" width="511" height="511" rx="111" ry="111"
        fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1"/>
  <text x="256" y="375" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="340" font-weight="600" fill="#ffffff" letter-spacing="-8">m</text>
</svg>
